        <section class="enrollment">
            <h2>Application</h2>
            <form action="https://formspree.io/f/mjgarkpy" method="post">
                <label>Parent/Guardian Name</label>
                <input type="text" name="parent_name" required>
                <label>Authorized Person To Pick Up Child</label>
                <input type="text" name="authorized">
                <label>Child's Name</label>
                <input type="text" name="child_name" required>
                <label>Child's Date Of Birth</label>
                <input type="date" name="child_dob" requied>
                <label>Phone Number</label>
                <input type="tel" name="phone" required>
                <label>Secondary Number</label>
                <input type="tel" name="phone" required>
                <label for="email">Email</label>
                <input type="email" name="email" required>
                <label>Requested Start Date</label>
                <input type="date" name="start_date">
                <label for="message">Allergies</label>
                <textarea name="message" id="message"></textarea>
                <button type="submit">Submit Application</button>
                 </form>
        </section>
        <footer>@ Little Beginners Daycare</footer>
