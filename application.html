<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width" initial-scale="1.0">
        <title>Application</title>
        <link rel="stylesheet"href="styles.css">
    </head>
 <body>
        <header>
            <nav class="navbar">
                <button class="menu-toggle">☰</div>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="enrollment.html">Enrollment</a></li>
                    <li><a href="about.us.html">About Us</a></li>
                    <li><a href="holidays.html">Holidays</a></li>
                    <li><a href="application.html">Application</a></li>
                </ul>
            </nav>
             <h1 class="logo">Little Beginners</h1>
        </header>
        <section class="enrollment">
            <h2>Application</h2>
            <form action="https://formspree.io/f/mjgarkpy" method="post">
                <label>Parent/Guardian Name</label>
                <input type="text" name="parent_name" required>
                <label>Authorized Person To Pick Up Child</label>
                <input type="text" name="authorized">
                <label>Child's Name</label>
                <input type="text" name="child_name" required>
                <label>Child's Date Of Birth</label>
                <input type="date" name="child_dob" requied>
                <label>Phone Number</label>
                <input type="tel" name="phone" required>
                <label>Secondary Number</label>
                <input type="tel" name="phone" required>
                <label for="email">Email</label>
                <input type="email" name="email" required>
                <label>Days Needed</label>
                <select name="days">
                    <option></option>
                    <option>Full Time</option>
                    <option>Part Time</option>
                    <option>Mon/Wed/Fri</option>
                    <option>Tue/Thu</option>
                </select>
                <label>Specified Days If Not Listed Above</label>
                <textarea name="message" id="message"></textarea>
                <label>Requested Start Date</label>
                <input type="date" name="start_date">
                <label>How did you hear about us?</label>
                <select name="referral">
                    <option></option>
                    <option>Google</option>
                    <option>Facebook</option>
                    <option>Friend or Family</option>
                    <option>Other</option>
                </select>
                <label>Daycare Experience</label>
                <select name="experience">
                    <option></option>
                    <option>First Daycare</option>
                    <option>Prior Experience</option>
                </select>
                <label>Preferred Form Of Payment</label>
                <select name="payment">
                    <option></option>
                    <option>Zelle</option>
                    <option>Cash App</option>
                    <option>Cash</option>
                </select>
                <label for="message">Brieflly describe your child health.(allergies,asthma,or other health concerns)</label>
                <textarea name="message" id="message"></textarea>
                <button type="submit">Submit Application</button>
                 </form>
        </section>
        <footer>@ Little Beginners Daycare</footer>
        <script src="script.js"></script>
    </body>
    </html>
