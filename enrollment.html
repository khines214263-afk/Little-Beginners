        <section class="enrollment">
            <h2>Enrollment Inquiry</h2>
            <form action="https://formspree.io/f/mjgarkpy" method="post">
                <label for="parent">Parent Name</label>
                <input type="text" id="parent" name="parent_name" required>
                <label for="child">Child Name</label>
                <input type="text" id="child" name="child_name" required>
                <label for="age">Child Age</label>
                <input type="number" id="age" name="child_age" requied>
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
                <label for="message">Additional Information</label>
                <textarea name="message" id="message"></textarea>
                <button type="submit">Submit Inquiry</button>
                 </form>
        </section>
        <footer>@ Little Beginners Daycare</footer>
