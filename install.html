            <p class="install">Add our daycare app to your phone for quick access to information, updates, and enrollment</p>
            <buttom id="installBtn">Install App</buttom>
            <p class="install">On iPhone:
                Tap the Share icon and choose<span>"Add to Home Screen".</span>
            </p>
        </div>
            <script>
                let deferredPrompt;
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    deferredPrompt = e;
                    document.getElementById("installBtn").style.display = "block";
                });
                document.getElementById("installBtn").addEventListener("click", () => {
                    deferredPrompt.prompt();
                })
            </script>
